global:
  scrape_interval: 15s
rule_files:
  - /etc/prometheus/alerts.yml
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
scrape_configs:
  - job_name: api
    metrics_path: /metrics
    # If you set METRICS_TOKEN on the api, the scrape needs the matching bearer
    # token or it will 401 (and ApiDown would fire). Uncomment:
    # authorization:
    #   credentials: '<METRICS_TOKEN>'
    static_configs:
      - targets: ['api:3000']
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
