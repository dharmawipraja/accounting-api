# ACTIVE-delivery template (generic webhook — a custom handler, or Discord with
# a `/slack`-suffixed URL; for Slack use alertmanager-slack.yml instead: Slack
# incoming webhooks reject Alertmanager's generic JSON). The alertmanager
# entrypoint (docker-compose.monitoring.yml) substitutes __ALERT_WEBHOOK_URL__
# from $ALERT_WEBHOOK_URL at startup; alertmanager.yml is the inert fallback.
route:
  receiver: default
  group_by: ['alertname']
  # Re-notify unresolved alerts so one dropped delivery isn't forever silent.
  repeat_interval: 4h
  routes:
    # The always-firing Watchdog goes ONLY to the heartbeat receiver — never
    # to the notification channel (it would ping every repeat_interval).
    - matchers: ['alertname="Watchdog"']
      receiver: heartbeat
      group_interval: 1m
      repeat_interval: 10m
receivers:
  - name: default
    webhook_configs:
      - url: '__ALERT_WEBHOOK_URL__'
        send_resolved: true
  - name: heartbeat
    # Blackhole unless activated: the entrypoint uncomments this when
    # $ALERT_HEARTBEAT_URL is set (e.g. a healthchecks.io ping URL).
    #HEARTBEAT webhook_configs:
    #HEARTBEAT   - url: '__ALERT_HEARTBEAT_URL__'
    #HEARTBEAT     send_resolved: false
