# Single-binary (monolithic) Loki with filesystem storage — right-sized for a
# single-VM deployment. Logs arrive from Grafana Alloy (see alloy.alloy) and
# are queried through Grafana's provisioned Loki datasource.
auth_enabled: false

server:
  http_listen_port: 3100

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: '2026-01-01'
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Enforce retention so the volume is bounded (the compactor deletes old chunks).
compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

limits_config:
  retention_period: 720h # 30 days
