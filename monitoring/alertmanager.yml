# INERT fallback config — alerts evaluate but reach no one. To activate
# delivery, set ONE env var in `.env` next to the compose files (no YAML
# editing needed — the alertmanager entrypoint in docker-compose.monitoring.yml
# substitutes it into the matching template at startup):
#   ALERT_SLACK_WEBHOOK_URL  → monitoring/alertmanager-slack.yml (native Slack;
#                              optional ALERT_SLACK_CHANNEL, default '#alerts')
#   ALERT_WEBHOOK_URL        → monitoring/alertmanager-webhook.yml (generic
#                              webhook: custom handler, or Discord with a
#                              `/slack`-suffixed URL)
# Optional in both active modes: ALERT_HEARTBEAT_URL routes the always-firing
# Watchdog alert to a dead-man's-switch service (e.g. healthchecks.io).
route:
  receiver: default
  group_by: ['alertname']
receivers:
  - name: default
