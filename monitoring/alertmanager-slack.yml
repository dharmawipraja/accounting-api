# ACTIVE-delivery template (native Slack). The alertmanager entrypoint
# (docker-compose.monitoring.yml) substitutes __ALERT_SLACK_WEBHOOK_URL__ /
# __ALERT_SLACK_CHANNEL__ from $ALERT_SLACK_WEBHOOK_URL / $ALERT_SLACK_CHANNEL
# at startup; alertmanager.yml is the inert fallback.
route:
  receiver: default
  group_by: ['alertname']
  # Re-notify unresolved alerts so one dropped delivery isn't forever silent.
  repeat_interval: 4h
  routes:
    # The always-firing Watchdog goes ONLY to the heartbeat receiver — never
    # to the notification channel (it would ping every repeat_interval).
    - matchers: ['alertname="Watchdog"']
      receiver: heartbeat
      group_interval: 1m
      repeat_interval: 10m
receivers:
  - name: default
    slack_configs:
      - api_url: '__ALERT_SLACK_WEBHOOK_URL__'
        channel: '__ALERT_SLACK_CHANNEL__'
        send_resolved: true
        title: '{{ .Status | toUpper }} {{ .CommonLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ "\n" }}{{ end }}'
  - name: heartbeat
    # Blackhole unless activated: the entrypoint uncomments this when
    # $ALERT_HEARTBEAT_URL is set (e.g. a healthchecks.io ping URL).
    #HEARTBEAT webhook_configs:
    #HEARTBEAT   - url: '__ALERT_HEARTBEAT_URL__'
    #HEARTBEAT     send_resolved: false
