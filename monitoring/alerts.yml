groups:
  - name: accounting-api
    rules:
      - alert: ApiDown
        expr: up{job="api"} == 0
        for: 2m
        labels: { severity: critical }
        annotations: { summary: 'API is down (no /metrics scrape for 2m)' }
      - alert: HighErrorRate
        expr: sum(rate(http_request_duration_seconds_count{status=~"5.."}[5m])) / sum(rate(http_request_duration_seconds_count[5m])) > 0.05
        for: 5m
        labels: { severity: warning }
        annotations: { summary: '5xx rate over 5% for 5m' }
      - alert: HighLatencyP95
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 1
        for: 10m
        labels: { severity: warning }
        annotations: { summary: 'p95 latency over 1s for 10m' }
      - alert: DbPoolSaturated
        expr: db_pool_waiting > 0
        for: 5m
        labels: { severity: warning }
        annotations: { summary: 'DB pool has waiting requests for 5m (raise DB_POOL_MAX?)' }
      - alert: BackupStale
        expr: time() - backup_last_success_timestamp_seconds > 93600
        for: 10m
        labels: { severity: critical }
        annotations: { summary: 'No successful DB backup in >26h' }
      - alert: DiskSpaceLow
        # Real filesystems only; the VM disk hosts Postgres + backups +
        # Prometheus + Loki, so a full disk takes everything down at once.
        expr: min by (mountpoint) (node_filesystem_avail_bytes{fstype!~"tmpfs|ramfs|overlay|squashfs"} / node_filesystem_size_bytes{fstype!~"tmpfs|ramfs|overlay|squashfs"}) < 0.10
        for: 10m
        labels: { severity: critical }
        annotations: { summary: 'Disk {{ $labels.mountpoint }} under 10% free for 10m' }
      - alert: MemoryPressureHigh
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.10
        for: 10m
        labels: { severity: warning }
        annotations: { summary: 'VM available memory under 10% for 10m' }
      - alert: Watchdog
        # Dead-man's switch: ALWAYS firing by design. Routed to the heartbeat
        # receiver (ALERT_HEARTBEAT_URL, e.g. a healthchecks.io ping), never to
        # the notification channel. Silence at the heartbeat service means the
        # Prometheus→Alertmanager pipeline itself is down.
        expr: vector(1)
        labels: { severity: none }
        annotations: { summary: 'Alerting pipeline heartbeat (always firing)' }
