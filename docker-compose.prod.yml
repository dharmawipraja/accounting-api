services:
  migrate:
    build:
      context: .
      target: build
    command: ['npx', 'prisma', 'migrate', 'deploy']
    environment:
      DATABASE_URL: postgresql://accounting:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/accounting?schema=public
    depends_on:
      db:
        condition: service_healthy
    restart: 'no'
    read_only: true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp

  api:
    init: true
    read_only: true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DB_POOL_MAX: 15
      DB_STATEMENT_TIMEOUT_MS: 30000
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    stop_grace_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          memory: 256M

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required (public hostname for auto-HTTPS)}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  db:
    restart: unless-stopped
    command:
      - postgres
      - '-c'
      - 'shared_buffers=256MB'
      - '-c'
      - 'effective_cache_size=1GB'
      - '-c'
      - 'max_connections=50'
      - '-c'
      - 'work_mem=8MB'
      - '-c'
      - 'maintenance_work_mem=128MB'
    deploy:
      resources:
        limits:
          memory: 1536M

  backup:
    image: postgres:16
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: accounting
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGDATABASE: accounting
      RETENTION_DAYS: '7'
      BACKUP_INTERVAL: '86400'
    entrypoint: ['/bin/sh', '/backup.sh']
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - backups:/backups
      - backup_metrics:/backup-metrics

  redis:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  caddy_data:
  caddy_config:
  backups:
  backup_metrics:
